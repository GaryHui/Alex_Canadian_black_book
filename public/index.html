<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Black Book Valuation Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-panel">
        <div>
          <p class="eyebrow">Search Canadian Used Cars</p>
          <h1>Black Book vehicle lookup</h1>
        </div>

        <div class="lookup-layout">
          <div class="lookup-menu" aria-label="Lookup modes">
            <button class="lookup-mode active" type="button" data-mode="free">
              <strong>Free Form</strong>
              <span>Search by vehicle description or VIN</span>
            </button>
            <button class="lookup-mode" type="button" data-mode="drilldown">
              <strong>Year, Make & Model</strong>
              <span>Drill down to a vehicle by year, make, model</span>
            </button>
          </div>

          <div class="lookup-panel">
            <form id="free-form" class="lookup-form">
              <label>
                <span>Vehicle description or VIN</span>
                <input name="searchText" value="2017 Honda O" placeholder="2017 Honda Odyssey or VIN" />
              </label>
              <button type="submit">Search</button>
            </form>

            <form id="drilldown-form" class="lookup-form" hidden>
              <label>
                <span>Year</span>
                <select class="drill-select" data-field="year"></select>
                <input class="manual-input" data-field="year" inputmode="numeric" hidden />
                <input name="year" type="hidden" value="2017" />
              </label>
              <label>
                <span>Make</span>
                <select class="drill-select" data-field="make"></select>
                <input class="manual-input" data-field="make" hidden />
                <input name="make" type="hidden" value="Honda" />
              </label>
              <label>
                <span>Model</span>
                <select class="drill-select" data-field="model"></select>
                <input class="manual-input" data-field="model" hidden />
                <input name="model" type="hidden" value="Odyssey" />
              </label>
              <label>
                <span>Series</span>
                <select class="drill-select" data-field="series"></select>
                <input class="manual-input" data-field="series" hidden />
                <input name="series" type="hidden" value="LX" />
              </label>
              <label>
                <span>Style</span>
                <select class="drill-select" data-field="style"></select>
                <input class="manual-input" data-field="style" hidden />
                <input name="style" type="hidden" value="4D Wagon" />
              </label>
              <button type="submit">Find</button>
            </form>

            <form id="valuation-form" class="form-grid">
              <label>
                <span>VIN</span>
                <input name="vin" value="2T2GGCEZ9RC032642" />
              </label>
              <label>
                <span>UVC</span>
                <input name="uvc" placeholder="Optional selected UVC" />
              </label>
              <input name="year" type="hidden" />
              <input name="make" type="hidden" />
              <input name="model" type="hidden" />
              <input name="series" type="hidden" />
              <input name="style" type="hidden" />
          <label>
            <span>Kilometers</span>
            <input name="kilometers" type="number" min="0" value="37000" required />
          </label>
          <label>
            <span>Region</span>
            <select name="region">
              <option value="BC">British Columbia</option>
              <option value="ON">Ontario</option>
              <option value="AB">Alberta</option>
              <option value="QC">Quebec</option>
              <option value="MB">Manitoba</option>
              <option value="SK">Saskatchewan</option>
            </select>
          </label>
          <label>
            <span>Country</span>
            <select name="country">
              <option value="C">Canada</option>
              <option value="U">United States</option>
            </select>
          </label>
          <button type="submit">Generate</button>
            </form>
          </div>
        </div>

        <p id="status" class="status">Ready.</p>
        <div id="choice-list" class="choice-list" hidden></div>
      </section>

      <section id="details" class="details" hidden>
        <header class="topbar">
          <button class="back" type="button" aria-label="Back">‹</button>
          <span>DETAILS</span>
        </header>

        <div class="vehicle-head">
          <h2 id="vehicle-title"></h2>
          <div class="vin-block">
            <span>VIN</span>
            <strong id="vehicle-vin"></strong>
          </div>
          <div class="info-row">
            <div class="info-box">
              <span>KILOMETERS</span>
              <strong id="vehicle-km"></strong>
            </div>
            <div class="info-box">
              <span>REGION</span>
              <strong id="vehicle-region"></strong>
            </div>
            <div class="info-box">
              <span>OPTIONS</span>
              <strong id="vehicle-options">0 selected</strong>
            </div>
          </div>
        </div>

        <div class="market-ribbon">
          <span id="active-market-label">AVG WHOLESALE</span>
        </div>

        <div class="market-tabs" role="tablist" aria-label="Market type">
          <button class="active" type="button" data-market="wholesale">Wholesale</button>
          <button type="button" data-market="retail">Retail</button>
          <button type="button" data-market="tradeIn">Trade-In</button>
        </div>

        <div class="table-wrap">
          <table class="value-table">
            <thead>
              <tr>
                <th></th>
                <th>XCLN</th>
                <th>CLN</th>
                <th>AVG</th>
                <th>RGH</th>
              </tr>
            </thead>
            <tbody id="value-body"></tbody>
          </table>
        </div>

        <div class="loan" id="loan-value"></div>
        <button class="retail-market" type="button">Retail Market</button>

        <details class="thresholds">
          <summary>Threshold details</summary>
          <pre id="threshold-json"></pre>
        </details>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
