<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in | AutoSwitch Canada</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">AutoSwitch Canada</p>
        <h1 id="login-title">Sign in to continue</h1>
        <p id="login-copy">Use Google to enter the right dealership workspace. Managers and staff are routed by approved access.</p>
        <button id="google-login" type="button">Continue with Google</button>
        <div class="turnstile-wrap" id="login-turnstile-wrap" hidden>
          <div id="login-turnstile"></div>
          <small id="login-turnstile-status" aria-live="polite"></small>
        </div>
        <p id="login-status" class="status" aria-live="polite">Checking login...</p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/turnstile.js"></script>
    <script src="/login.js"></script>
  </body>
</html>
