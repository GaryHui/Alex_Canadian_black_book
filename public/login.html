<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">Canadian Black Book Demo</p>
        <h1>Sign in to continue</h1>
        <p>Use Google before submitting a valuation request. Your email, phone, vehicle input, and valuation result will be saved for follow-up.</p>
        <button id="google-login" type="button">Continue with Google</button>
        <p id="login-status" class="status">Checking login...</p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/login.js"></script>
  </body>
</html>
